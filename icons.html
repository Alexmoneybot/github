<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to  Add Icons In HTML</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <h1>tthis is how to add aicon using font awesome</h1>
    
    <h2>lets learn this using the  <abbr title="Content Delivery  Network">CDN</abbr> </h2>
    <i class="fa-solid fa-user"></i>
    <i class="fa-solid fa-house"></i>
    <i class="fa-brands fa-github"></i>
    <span>love icon</span> <i class="fa-solid fa-heart"></i>
    <i class="fa-regular fa-heart"></i>
    <i class="fa-solid fa-heart" style="color:red;"></i>
    <i class="fa-solid fa-message"></i>
    <i class="fa-regular fa-message"></i>




    <i class="fa-solid fa-envelope"></i>      <!-- email/message -->
    <i class="fa-regular fa-envelope"></i>
    
    <i class="fa-solid fa-comments"></i>      <!-- multiple messages -->
    <i class="fa-regular fa-comments"></i>
    
    <i class="fa-solid fa-comment"></i>       <!-- single chat bubble -->
    <i class="fa-regular fa-comment"></i>

    <iframe src="https://waptrick.com/en/applications/" frameborder="1000" height="500"></iframe>
    
    
</body>
</html>
